    "body": "\n<p>前の単元では「<b>=</b>」が代入演算子(箱に値を入れる)だと学びました。今度は、<b>2つの値を比べる</b>ための演算子を学びます。これは次の単元の「もし〜ならば」(分岐)で必ず使う、重要な道具です。</p>\n\n<h4 style=\"color:var(--primary-dark); margin-top:18px;\">⚖️ 比較演算子とは</h4>\n\n<p><span class=\"term\" data-term=\"比較演算子\">比較演算子</span>とは、<b>2つの値を比べて「真(True)か 偽(False)か」を判定する演算子</b>です。プログラムで「もし〜ならば」のような判断をするときの土台になります。</p>\n\n<div class=\"figure\">\n<svg viewBox=\"0 0 540 160\" xmlns=\"http://www.w3.org/2000/svg\">\n  <text x=\"270\" y=\"22\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"#5B21B6\">「kuji の値が 4 以下?」を比較演算子で判定</text>\n  <!-- 左辺 -->\n  <g transform=\"translate(40, 50)\">\n    <rect x=\"0\" y=\"0\" width=\"80\" height=\"60\" fill=\"#fff\" stroke=\"#7C3AED\" stroke-width=\"2\"/>\n    <text x=\"40\" y=\"40\" text-anchor=\"middle\" font-size=\"26\" font-weight=\"700\" fill=\"#5B21B6\">3</text>\n    <text x=\"40\" y=\"78\" text-anchor=\"middle\" font-size=\"11\" fill=\"#1F2937\">kuji</text>\n  </g>\n  <!-- 演算子 -->\n  <text x=\"160\" y=\"92\" text-anchor=\"middle\" font-size=\"32\" font-weight=\"700\" fill=\"#F59E0B\">&lt;=</text>\n  <text x=\"160\" y=\"112\" text-anchor=\"middle\" font-size=\"11\" fill=\"#92400E\">「以下」</text>\n  <!-- 右辺 -->\n  <g transform=\"translate(200, 50)\">\n    <rect x=\"0\" y=\"0\" width=\"80\" height=\"60\" fill=\"#FEF3C7\" stroke=\"#F59E0B\" stroke-width=\"2\"/>\n    <text x=\"40\" y=\"40\" text-anchor=\"middle\" font-size=\"26\" font-weight=\"700\" fill=\"#92400E\">4</text>\n  </g>\n  <!-- 矢印 -->\n  <line x1=\"305\" y1=\"80\" x2=\"365\" y2=\"80\" stroke=\"#5B21B6\" stroke-width=\"2.5\"/>\n  <polygon points=\"360,75 370,80 360,85\" fill=\"#5B21B6\"/>\n  <text x=\"335\" y=\"68\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"#5B21B6\">判定</text>\n  <!-- 結果 -->\n  <g transform=\"translate(380, 50)\">\n    <rect x=\"0\" y=\"0\" width=\"120\" height=\"60\" fill=\"#A7F3D0\" stroke=\"#10B981\" stroke-width=\"2.5\" rx=\"6\"/>\n    <text x=\"60\" y=\"40\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#065F46\">真 (True)</text>\n    <text x=\"60\" y=\"78\" text-anchor=\"middle\" font-size=\"11\" fill=\"#065F46\">3 は 4 以下なので「真」</text>\n  </g>\n</svg>\n<div class=\"figure-caption\">図1:比較の結果は「真(True)」か「偽(False)」のどちらか</div>\n</div>\n\n<p>このように、比較演算子は計算結果として<b>「真」または「偽」</b>を返します(数値ではなく)。これを<span class=\"term\" data-term=\"真偽値\">真偽値</span>(boolean)といいます。</p>\n\n<h4 style=\"color:var(--primary-dark); margin-top:18px;\">📋 比較演算子の一覧(全6種)</h4>\n\n<div class=\"figure\" style=\"text-align:left; padding:14px 18px;\">\n<table style=\"width:100%; border-collapse:collapse; font-size:0.95em;\">\n  <thead><tr style=\"background:var(--primary); color:#fff;\">\n    <th style=\"padding:8px; border:1px solid var(--primary-dark);\">演算子</th>\n    <th style=\"padding:8px; border:1px solid var(--primary-dark);\">読み方</th>\n    <th style=\"padding:8px; border:1px solid var(--primary-dark);\">意味</th>\n    <th style=\"padding:8px; border:1px solid var(--primary-dark);\">条件式の例</th>\n    <th style=\"padding:8px; border:1px solid var(--primary-dark);\">説明</th>\n  </tr></thead>\n  <tbody>\n  <tr><td style=\"padding:8px; border:1px solid var(--border); text-align:center; font-weight:bold; color:var(--primary); font-family:monospace; font-size:1.1em;\">==</td><td style=\"padding:6px; border:1px solid var(--border);\">ダブルイコール</td><td style=\"padding:6px; border:1px solid var(--border);\">等しい</td><td style=\"padding:6px; border:1px solid var(--border); font-family:monospace;\">x == 80</td><td style=\"padding:6px; border:1px solid var(--border);\">x の値が 80 ならば真</td></tr>\n  <tr style=\"background:#F5F3FF;\"><td style=\"padding:8px; border:1px solid var(--border); text-align:center; font-weight:bold; color:var(--primary); font-family:monospace; font-size:1.1em;\">!=</td><td style=\"padding:6px; border:1px solid var(--border);\">ノットイコール</td><td style=\"padding:6px; border:1px solid var(--border);\">等しくない</td><td style=\"padding:6px; border:1px solid var(--border); font-family:monospace;\">x != 80</td><td style=\"padding:6px; border:1px solid var(--border);\">x の値が 80 でなければ真</td></tr>\n  <tr><td style=\"padding:8px; border:1px solid var(--border); text-align:center; font-weight:bold; color:var(--primary); font-family:monospace; font-size:1.1em;\">&gt;</td><td style=\"padding:6px; border:1px solid var(--border);\">大なり</td><td style=\"padding:6px; border:1px solid var(--border);\">超過(より大きい)</td><td style=\"padding:6px; border:1px solid var(--border); font-family:monospace;\">x &gt; 80</td><td style=\"padding:6px; border:1px solid var(--border);\">x が 80 より大きければ真<br><small>(80ぴったりは含まない)</small></td></tr>\n  <tr style=\"background:#F5F3FF;\"><td style=\"padding:8px; border:1px solid var(--border); text-align:center; font-weight:bold; color:var(--primary); font-family:monospace; font-size:1.1em;\">&gt;=</td><td style=\"padding:6px; border:1px solid var(--border);\">大なりイコール</td><td style=\"padding:6px; border:1px solid var(--border);\">以上</td><td style=\"padding:6px; border:1px solid var(--border); font-family:monospace;\">x &gt;= 80</td><td style=\"padding:6px; border:1px solid var(--border);\">x が 80 以上ならば真<br><small>(80ぴったりも含む)</small></td></tr>\n  <tr><td style=\"padding:8px; border:1px solid var(--border); text-align:center; font-weight:bold; color:var(--primary); font-family:monospace; font-size:1.1em;\">&lt;</td><td style=\"padding:6px; border:1px solid var(--border);\">小なり</td><td style=\"padding:6px; border:1px solid var(--border);\">未満(より小さい)</td><td style=\"padding:6px; border:1px solid var(--border); font-family:monospace;\">x &lt; 80</td><td style=\"padding:6px; border:1px solid var(--border);\">x が 80 未満ならば真<br><small>(80ぴったりは含まない)</small></td></tr>\n  <tr style=\"background:#F5F3FF;\"><td style=\"padding:8px; border:1px solid var(--border); text-align:center; font-weight:bold; color:var(--primary); font-family:monospace; font-size:1.1em;\">&lt;=</td><td style=\"padding:6px; border:1px solid var(--border);\">小なりイコール</td><td style=\"padding:6px; border:1px solid var(--border);\">以下</td><td style=\"padding:6px; border:1px solid var(--border); font-family:monospace;\">x &lt;= 80</td><td style=\"padding:6px; border:1px solid var(--border);\">x が 80 以下ならば真<br><small>(80ぴったりも含む)</small></td></tr>\n  </tbody>\n</table>\n<div class=\"figure-caption\">表1:比較演算子の全6種類</div>\n</div>\n\n<p style=\"background:#FEF3C7; padding:10px 14px; border-left:4px solid #F59E0B; border-radius:6px; margin:10px 0;\">⚠️ <b>「=」と「==」を混同しないこと!</b><br>\n<code>kazu = 5</code> ← <b>=</b>1個=<b>代入</b>(kazuに5を入れる)<br>\n<code>kazu == 5</code> ← <b>=</b>2個=<b>比較</b>(kazuと5が等しいか調べる)<br>\nプログラム初心者がいちばん間違えるところ。「<b>等しい?と聞くときは=を2個</b>」と覚えましょう。</p>\n\n<h4 style=\"color:var(--primary-dark); margin-top:18px;\">🎯 数直線で覚える「以上・以下・超過・未満」</h4>\n\n<p>日本語の「以上」「以下」と「超過」「未満」を、数学と同じく数直線で整理しましょう。</p>\n\n<div class=\"figure\">\n<svg viewBox=\"0 0 580 280\" xmlns=\"http://www.w3.org/2000/svg\">\n  <!-- x >= 80 (以上) -->\n  <g transform=\"translate(20, 30)\">\n    <text x=\"0\" y=\"0\" font-size=\"13\" font-weight=\"700\" fill=\"#5B21B6\">x &gt;= 80(80以上)</text>\n    <line x1=\"0\" y1=\"20\" x2=\"260\" y2=\"20\" stroke=\"#374151\" stroke-width=\"1.5\"/>\n    <line x1=\"100\" y1=\"14\" x2=\"100\" y2=\"26\" stroke=\"#374151\" stroke-width=\"1.5\"/>\n    <text x=\"100\" y=\"42\" text-anchor=\"middle\" font-size=\"11\">80</text>\n    <circle cx=\"100\" cy=\"20\" r=\"6\" fill=\"#10B981\" stroke=\"#065F46\" stroke-width=\"1.5\"/>\n    <line x1=\"100\" y1=\"20\" x2=\"260\" y2=\"20\" stroke=\"#10B981\" stroke-width=\"4\"/>\n    <polygon points=\"252,16 260,20 252,24\" fill=\"#10B981\"/>\n    <text x=\"180\" y=\"14\" text-anchor=\"middle\" font-size=\"10\" fill=\"#065F46\">80も含む(●)</text>\n  </g>\n  <!-- x > 80 (超過) -->\n  <g transform=\"translate(300, 30)\">\n    <text x=\"0\" y=\"0\" font-size=\"13\" font-weight=\"700\" fill=\"#5B21B6\">x &gt; 80(80超過/より大きい)</text>\n    <line x1=\"0\" y1=\"20\" x2=\"260\" y2=\"20\" stroke=\"#374151\" stroke-width=\"1.5\"/>\n    <line x1=\"100\" y1=\"14\" x2=\"100\" y2=\"26\" stroke=\"#374151\" stroke-width=\"1.5\"/>\n    <text x=\"100\" y=\"42\" text-anchor=\"middle\" font-size=\"11\">80</text>\n    <circle cx=\"100\" cy=\"20\" r=\"6\" fill=\"#fff\" stroke=\"#EF4444\" stroke-width=\"2\"/>\n    <line x1=\"106\" y1=\"20\" x2=\"260\" y2=\"20\" stroke=\"#EF4444\" stroke-width=\"4\"/>\n    <polygon points=\"252,16 260,20 252,24\" fill=\"#EF4444\"/>\n    <text x=\"180\" y=\"14\" text-anchor=\"middle\" font-size=\"10\" fill=\"#991B1B\">80は含まない(○)</text>\n  </g>\n  <!-- x <= 80 (以下) -->\n  <g transform=\"translate(20, 150)\">\n    <text x=\"0\" y=\"0\" font-size=\"13\" font-weight=\"700\" fill=\"#5B21B6\">x &lt;= 80(80以下)</text>\n    <line x1=\"0\" y1=\"20\" x2=\"260\" y2=\"20\" stroke=\"#374151\" stroke-width=\"1.5\"/>\n    <line x1=\"160\" y1=\"14\" x2=\"160\" y2=\"26\" stroke=\"#374151\" stroke-width=\"1.5\"/>\n    <text x=\"160\" y=\"42\" text-anchor=\"middle\" font-size=\"11\">80</text>\n    <line x1=\"0\" y1=\"20\" x2=\"160\" y2=\"20\" stroke=\"#10B981\" stroke-width=\"4\"/>\n    <circle cx=\"160\" cy=\"20\" r=\"6\" fill=\"#10B981\" stroke=\"#065F46\" stroke-width=\"1.5\"/>\n    <polygon points=\"8,16 0,20 8,24\" fill=\"#10B981\"/>\n    <text x=\"80\" y=\"14\" text-anchor=\"middle\" font-size=\"10\" fill=\"#065F46\">80も含む(●)</text>\n  </g>\n  <!-- x < 80 (未満) -->\n  <g transform=\"translate(300, 150)\">\n    <text x=\"0\" y=\"0\" font-size=\"13\" font-weight=\"700\" fill=\"#5B21B6\">x &lt; 80(80未満/より小さい)</text>\n    <line x1=\"0\" y1=\"20\" x2=\"260\" y2=\"20\" stroke=\"#374151\" stroke-width=\"1.5\"/>\n    <line x1=\"160\" y1=\"14\" x2=\"160\" y2=\"26\" stroke=\"#374151\" stroke-width=\"1.5\"/>\n    <text x=\"160\" y=\"42\" text-anchor=\"middle\" font-size=\"11\">80</text>\n    <line x1=\"0\" y1=\"20\" x2=\"154\" y2=\"20\" stroke=\"#EF4444\" stroke-width=\"4\"/>\n    <circle cx=\"160\" cy=\"20\" r=\"6\" fill=\"#fff\" stroke=\"#EF4444\" stroke-width=\"2\"/>\n    <polygon points=\"8,16 0,20 8,24\" fill=\"#EF4444\"/>\n    <text x=\"80\" y=\"14\" text-anchor=\"middle\" font-size=\"10\" fill=\"#991B1B\">80は含まない(○)</text>\n  </g>\n</svg>\n<div class=\"figure-caption\">図2:「以上・以下」(=がつく)はぴったりの値も含む。「超過・未満」(=がつかない)は含まない</div>\n</div>\n\n<p style=\"background:var(--primary-pale); padding:10px 14px; border-left:4px solid var(--primary); border-radius:6px; margin:10px 0;\">📌 <b>覚え方:「=」がついていれば、ぴったりの値も含む</b><br>\n<code>&gt;=</code>(以上)= 大なり<b>+ =</b>:80以上は80も含む<br>\n<code>&lt;=</code>(以下)= 小なり<b>+ =</b>:80以下は80も含む<br>\n逆に <code>&gt;</code>(超過)・<code>&lt;</code>(未満)は「=」がないので、80ぴったりは含みません。</p>\n\n<h4 style=\"color:var(--primary-dark); margin-top:18px;\">🎰 比較演算子の使用例(おみくじプログラム)</h4>\n\n<p>比較演算子は、次の単元で学ぶ「もし〜ならば」(分岐)とセットで使います。先取りで、おみくじの判定例を見てみましょう。</p>\n\n<div class=\"code-flow-wrap\">\n  <div class=\"code-block\">\n<span class=\"ln\">(1)</span> <span class=\"var\">kuji</span> = <span class=\"num\">1</span>          <span class=\"cmt\"># くじの番号</span><br>\n<span class=\"ln\">(2)</span> <span class=\"kw\">もし</span> <span class=\"var\">kuji</span> <span class=\"kw\">&lt;= </span><span class=\"num\">4</span> <span class=\"kw\">ならば</span>:<br>\n<span class=\"ln\">(3)</span> <span class=\"indent\"></span>| <span class=\"kw\">表示する</span>(<span class=\"str\">\"大吉\"</span>)<br>\n<span class=\"ln\">(4)</span> <span class=\"kw\">そうでなければ</span>:<br>\n<span class=\"ln\">(5)</span> <span class=\"indent\"></span>L <span class=\"kw\">表示する</span>(<span class=\"str\">\"中吉\"</span>)\n  </div>\n  <div class=\"flowchart-block\">\n    <svg viewBox=\"0 0 240 320\" xmlns=\"http://www.w3.org/2000/svg\">\n      <defs><marker id=\"ar4a\" markerWidth=\"10\" markerHeight=\"10\" refX=\"5\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 6 3, 0 6\" fill=\"#5B21B6\"/></marker></defs>\n      <ellipse cx=\"120\" cy=\"22\" rx=\"56\" ry=\"16\" fill=\"#EDE9FE\" stroke=\"#7C3AED\" stroke-width=\"2\"/>\n      <text x=\"120\" y=\"27\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"#5B21B6\">開始</text>\n      <line x1=\"120\" y1=\"38\" x2=\"120\" y2=\"58\" stroke=\"#5B21B6\" stroke-width=\"1.5\" marker-end=\"url(#ar4a)\"/>\n      <rect x=\"50\" y=\"60\" width=\"140\" height=\"32\" fill=\"#fff\" stroke=\"#7C3AED\" stroke-width=\"2\" rx=\"3\"/>\n      <text x=\"120\" y=\"80\" text-anchor=\"middle\" font-size=\"13\" font-family=\"Consolas, monospace\">kuji = 1</text>\n      <line x1=\"120\" y1=\"92\" x2=\"120\" y2=\"108\" stroke=\"#5B21B6\" stroke-width=\"1.5\" marker-end=\"url(#ar4a)\"/>\n      <!-- 判断(ひし形) -->\n      <polygon points=\"120,110 200,150 120,190 40,150\" fill=\"#fff\" stroke=\"#7C3AED\" stroke-width=\"2\"/>\n      <text x=\"120\" y=\"148\" text-anchor=\"middle\" font-size=\"12\" font-family=\"Consolas, monospace\">kuji &lt;= 4</text>\n      <text x=\"120\" y=\"164\" text-anchor=\"middle\" font-size=\"11\">?</text>\n      <!-- Yes (左) -->\n      <line x1=\"40\" y1=\"150\" x2=\"14\" y2=\"150\" stroke=\"#5B21B6\"/>\n      <text x=\"22\" y=\"144\" font-size=\"10\" fill=\"#10B981\" font-weight=\"700\">Yes</text>\n      <line x1=\"14\" y1=\"150\" x2=\"14\" y2=\"220\" stroke=\"#5B21B6\" marker-end=\"url(#ar4a)\"/>\n      <path d=\"M 0 222 L 80 222 L 92 240 L 80 258 L 0 258 Z\" fill=\"#fff\" stroke=\"#7C3AED\" stroke-width=\"2\"/>\n      <text x=\"46\" y=\"244\" text-anchor=\"middle\" font-size=\"11\">「大吉」</text>\n      <text x=\"46\" y=\"256\" text-anchor=\"middle\" font-size=\"11\">を表示</text>\n      <!-- No (右) -->\n      <line x1=\"200\" y1=\"150\" x2=\"226\" y2=\"150\" stroke=\"#5B21B6\"/>\n      <text x=\"218\" y=\"144\" font-size=\"10\" fill=\"#EF4444\" font-weight=\"700\">No</text>\n      <line x1=\"226\" y1=\"150\" x2=\"226\" y2=\"220\" stroke=\"#5B21B6\" marker-end=\"url(#ar4a)\"/>\n      <path d=\"M 148 222 L 228 222 L 240 240 L 228 258 L 148 258 Z\" fill=\"#fff\" stroke=\"#7C3AED\" stroke-width=\"2\"/>\n      <text x=\"194\" y=\"244\" text-anchor=\"middle\" font-size=\"11\">「中吉」</text>\n      <text x=\"194\" y=\"256\" text-anchor=\"middle\" font-size=\"11\">を表示</text>\n      <!-- 合流 -->\n      <line x1=\"46\" y1=\"258\" x2=\"46\" y2=\"278\" stroke=\"#5B21B6\"/>\n      <line x1=\"194\" y1=\"258\" x2=\"194\" y2=\"278\" stroke=\"#5B21B6\"/>\n      <line x1=\"46\" y1=\"278\" x2=\"194\" y2=\"278\" stroke=\"#5B21B6\"/>\n      <line x1=\"120\" y1=\"278\" x2=\"120\" y2=\"294\" stroke=\"#5B21B6\" marker-end=\"url(#ar4a)\"/>\n      <ellipse cx=\"120\" cy=\"306\" rx=\"56\" ry=\"14\" fill=\"#EDE9FE\" stroke=\"#7C3AED\" stroke-width=\"2\"/>\n      <text x=\"120\" y=\"310\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"#5B21B6\">終了</text>\n    </svg>\n    <div class=\"flowchart-caption\">kujiが4以下なら「大吉」、そうでなければ「中吉」</div>\n  </div>\n</div>\n<div class=\"inline-quiz\">\n<div class=\"inline-quiz-header\">📝 ミニテスト(2問) — 比較演算子と分岐 <span class=\"iq-arrow\">▼</span></div>\n<div class=\"inline-quiz-body\">\n<div class=\"iq-q\">\n<div class=\"iq-question\">Q1. 次のプログラムで kuji = 3 のとき、画面に何が表示されますか?</div>\n<div class=\"iq-code\"><span class=\"ln\">(1)</span> <span class=\"var\">kuji</span> = <span class=\"num\">3</span>\n<span class=\"ln\">(2)</span> <span class=\"kw\">もし</span> <span class=\"var\">kuji</span> &lt;= <span class=\"num\">4</span> <span class=\"kw\">ならば</span>:\n<span class=\"ln\">(3)</span> <span class=\"indent\"></span>| <span class=\"kw\">表示する</span>(<span class=\"str\">\"大吉\"</span>)\n<span class=\"ln\">(4)</span> <span class=\"kw\">そうでなければ</span>:\n<span class=\"ln\">(5)</span> <span class=\"indent\"></span>L <span class=\"kw\">表示する</span>(<span class=\"str\">\"中吉\"</span>)</div>\n<div class=\"iq-options\">\n  <button class=\"iq-opt\" data-correct=\"true\">大吉</button>\n  <button class=\"iq-opt\" data-correct=\"false\">中吉</button>\n  <button class=\"iq-opt\" data-correct=\"false\">両方</button>\n  <button class=\"iq-opt\" data-correct=\"false\">何も表示されない</button>\n</div>\n<div class=\"iq-feedback\" data-exp=\"kuji=3 で、3 &lt;= 4 は&lt;b&gt;真&lt;/b&gt;(3は4以下)。よって(3)が実行され「大吉」を表示。\"></div>\n</div>\n<div class=\"iq-q\">\n<div class=\"iq-question\">Q2. 同じプログラムで kuji = 7 のとき、画面に何が表示されますか?</div>\n<div class=\"iq-options\">\n  <button class=\"iq-opt\" data-correct=\"false\">大吉</button>\n  <button class=\"iq-opt\" data-correct=\"true\">中吉</button>\n  <button class=\"iq-opt\" data-correct=\"false\">両方</button>\n  <button class=\"iq-opt\" data-correct=\"false\">何も表示されない</button>\n</div>\n<div class=\"iq-feedback\" data-exp=\"kuji=7 で、7 &lt;= 4 は&lt;b&gt;偽&lt;/b&gt;(7は4以下ではない)。よって(5)が実行され「中吉」を表示。\"></div>\n</div>\n</div>\n</div>\n\n\n<div class=\"exec-result\">大吉</div>\n\n<p>(2)行目の <code>kuji &lt;= 4</code> が比較演算子の登場場面です。kujiの値が1なので、1 ≤ 4 は<b>真</b>。よって(3)が実行され「大吉」が表示されます。</p>\n\n<p>このように、比較演算子は<b>判断(ひし形)の中身</b>として登場し、結果が「真/偽」のどちらかになることでプログラムの流れが変わります。</p>\n\n<h4 style=\"color:var(--primary-dark); margin-top:18px;\">🔍 比較演算子の判定例</h4>\n\n<p>具体例で比較演算子の動きを確認しましょう。<code>x = 80</code> のとき:</p>\n\n<div class=\"figure\" style=\"text-align:left; padding:14px 18px;\">\n<table style=\"width:100%; border-collapse:collapse; font-size:0.95em;\">\n  <thead><tr style=\"background:var(--primary); color:#fff;\">\n    <th style=\"padding:8px; border:1px solid var(--primary-dark);\">条件式</th>\n    <th style=\"padding:8px; border:1px solid var(--primary-dark);\">x=80のとき</th>\n    <th style=\"padding:8px; border:1px solid var(--primary-dark);\">理由</th>\n  </tr></thead>\n  <tbody>\n  <tr><td style=\"padding:8px; border:1px solid var(--border); font-family:monospace; font-weight:bold;\">x == 80</td><td style=\"padding:6px; border:1px solid var(--border); text-align:center; color:#065F46; font-weight:bold;\">真</td><td style=\"padding:6px; border:1px solid var(--border);\">80と80は等しい</td></tr>\n  <tr style=\"background:#F5F3FF;\"><td style=\"padding:8px; border:1px solid var(--border); font-family:monospace; font-weight:bold;\">x != 80</td><td style=\"padding:6px; border:1px solid var(--border); text-align:center; color:#991B1B; font-weight:bold;\">偽</td><td style=\"padding:6px;     "body": "\n<p>これまでに「変数」と「比較演算子」を学びました。今度は、<b>条件によってプログラムの動きを変える</b>仕組み=<span class=\"term\" data-term=\"分岐構造\">分岐構造</span>を学びます。これでようやく「判断ができるプログラム」が書けるようになります。<b>高認情報サンプル問題の大問4の中心テーマ</b>でもあります。</p>\n\n<h4 style=\"color:var(--primary-dark); margin-top:18px;\">🤔 「もし〜ならば」の基本パターン</h4>\n\n<p>分岐構造は、日本語の「<b>もし〜ならば、…する</b>」をプログラムにしたものです。共通テスト用プログラム表記では、<code>もし 条件 ならば:</code> と書きます。</p>\n\n<div class=\"code-flow-wrap\">\n  <div class=\"code-block\">\n<span class=\"ln\">(1)</span> <span class=\"var\">ten</span> = <span class=\"num\">85</span><br>\n<span class=\"ln\">(2)</span> <span class=\"kw\">もし</span> <span class=\"var\">ten</span> &gt;= <span class=\"num\">80</span> <span class=\"kw\">ならば</span>:<br>\n<span class=\"ln\">(3)</span> <span class=\"indent\"></span>L <span class=\"kw\">表示する</span>(<span class=\"str\">\"合格\"</span>)\n  </div>\n  <div class=\"flowchart-block\">\n    <svg viewBox=\"0 0 240 320\" xmlns=\"http://www.w3.org/2000/svg\">\n      <defs><marker id=\"ar5a\" markerWidth=\"10\" markerHeight=\"10\" refX=\"5\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 6 3, 0 6\" fill=\"#5B21B6\"/></marker></defs>\n      <ellipse cx=\"120\" cy=\"22\" rx=\"56\" ry=\"16\" fill=\"#EDE9FE\" stroke=\"#7C3AED\" stroke-width=\"2\"/>\n      <text x=\"120\" y=\"27\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"#5B21B6\">開始</text>\n      <line x1=\"120\" y1=\"38\" x2=\"120\" y2=\"58\" stroke=\"#5B21B6\" stroke-width=\"1.5\" marker-end=\"url(#ar5a)\"/>\n      <rect x=\"50\" y=\"60\" width=\"140\" height=\"32\" fill=\"#fff\" stroke=\"#7C3AED\" stroke-width=\"2\" rx=\"3\"/>\n      <text x=\"120\" y=\"80\" text-anchor=\"middle\" font-size=\"13\" font-family=\"Consolas, monospace\">ten = 85</text>\n      <line x1=\"120\" y1=\"92\" x2=\"120\" y2=\"108\" stroke=\"#5B21B6\" stroke-width=\"1.5\" marker-end=\"url(#ar5a)\"/>\n      <polygon points=\"120,110 200,150 120,190 40,150\" fill=\"#fff\" stroke=\"#7C3AED\" stroke-width=\"2\"/>\n      <text x=\"120\" y=\  <span class=\"num\">80</span> <span class=\"kw\">ならば</span>:\n<span class=\"ln\">(3)</span> <span class=\"indent\"></span>L <span class=\"kw\">表示する</span>(<span class=\"str\">\"合格\"</span>)</div>\n<div class=\"iq-options\">\n  <button class=\"iq-opt\" data-correct=\"true\">合格</button>\n  <button class=\"iq-opt\" data-correct=\"false\">不合格</button>\n  <button class=\"iq-opt\" data-correct=\"false\">何も表示されない</button>\n  <button class=\"iq-opt\" data-correct=\"false\">エラー</button>\n</div>\n<div class=\"iq-feedback\" data-exp=\"ten=85 で、85 &gt;= 80 は&lt;b&gt;真&lt;/b&gt;。よって(3)が実行され「合格」が表示されます。\"></div>\n</div>\n<div class=\"iq-q\">\n<div class=\"iq-question\">Q2. 同じプログラムで ten = 60 のとき、画面に何が表示されますか?</div>\n<div class=\"iq-options\">\n  <button class=\"iq-opt\" data-correct=\"false\">合格</button>\n  <button class=\"iq-opt\" data-correct=\"false\">不合格</button>\n  <button class=\"iq-opt\" data-correct=\"true\">何も表示されない</button>\n  <button class=\"iq-opt\" data-correct=\"false\">エラー</button>\n</div>\n<div class=\"iq-feedback\" data-exp=\"ten=60 で、60 &gt;= 80 は&lt;b&gt;偽&lt;/b&gt;。「そうでなければ」もないので、&lt;b&gt;何も表示されません&lt;/b&gt;(プログラムは終了)。\"></div>\n</div>\n</div>\n</div>\n\n\n<div class=\"exec-result\">合格</div>\n\n<p>(2)行目の条件 <code>ten &gt;= 80</code> が<b>真(Yes)</b>のときだけ、(3)行目の表示処理が実行されます。<b>偽(No)</b>のときは何もしないで終わります。</p>\n\n<p style=\"background:var(--primary-pale); padding:10px 14px; border-left:4px solid var(--primary); border-radius:6px; margin:10px 0;\">📌 <b>共通テスト用表記の決まり</b><br>\n・条件文の最後に必ず<b>コロン「:」</b>を付ける<br>\n・条件が真のときに実行する処理は、左に<b>「|」(縦棒)</b>と<b>「L」(終わりの記号)</b>でくくる<br>\n・「|」「L」のついた行は<b>処理のかたまり</b>を表します</p>\n\n<h4 style=\"color:var(--primary-dark); margin-top:18px;\">🔀 「もし〜ならば、そうでなければ」の二択分岐</h4>\n\n<p>真のときと偽のときで<b>違う処理</b>をしたいときは、<code>そうでなければ:</code> を使います。これで「合格」と「不合格」のような二択分岐ができます。</p>\n\n<div class=\"code-flow-wrap\">\n  <div class=\"code-block\">\n<span class=\"ln\">(1)</span> <span class=\"var\">ten</span> = <span class=\"num\">75</span><br>\n<span class=\"ln\">(2)</s >)\n<span class=\"ln\">(8)</span> <span class=\"kw\">そうでなければ</span>:\n<span class=\"ln\">(9)</span> <span class=\"indent\"></span>L <span class=\"kw\">表示する</span>(<span class=\"str\">\"凶\"</span>)</div>\n<div class=\"iq-options\">\n  <button class=\"iq-opt\" data-correct=\"false\">大吉</button>\n  <button class=\"iq-opt\" data-correct=\"false\">中吉</button>\n  <button class=\"iq-opt\" data-correct=\"true\">小吉</button>\n  <button class=\"iq-opt\" data-correct=\"false\">凶</button>\n</div>\n<div class=\"iq-feedback\" data-exp=\"kuji=5 で:1ではない →3以下でもない(5&gt;3)→&lt;b&gt;7以下で真&lt;/b&gt; →「小吉」を表示。\"></div>\n</div>\n<div class=\"iq-q\">\n<div class=\"iq-question\">Q2. 同じおみくじプログラムで kuji = 10 のとき、何が表示されますか?</div>\n<div class=\"iq-options\">\n  <button class=\"iq-opt\" data-correct=\"false\">大吉</button>\n  <button class=\"iq-opt\" data-correct=\"false\">中吉</button>\n  <button class=\"iq-opt\" data-correct=\"false\">小吉</button>\n  <button class=\"iq-opt\" data-correct=\"true\">凶</button>\n</div>\n<div class=\"iq-feedback\" data-exp=\"kuji=10 で:1ではない →3以下でもない →7以下でもない(10&gt;7)→「そうでなければ」で「凶」を表示。\"></div>\n</div>\n</div>\n</div>\n\n\n<div class=\"exec-result\">中吉</div>\n\n<p>kuji = 3 のとき:1ではない →3以下で<b>真</b> →「中吉」を表示。上から順に判定して、最初に真になったものだけが実行されます。</p>\n\n<h4 style=\"color:var(--primary-dark); margin-top:18px;\">📞 関数の呼び出し方</h4>\n\n<p>プログラムには、<b>あらかじめ用意された便利な機能</b>があります。これを<span class=\"term\" data-term=\"関数\">関数</span>といいます。すでに使ってきた <code>表示する()</code> も関数の1つ。</p>\n\n<p>関数は「<b>関数名(値)</b>」の形で呼び出します。値のことを<span class=\"term\" data-term=\"引数\">引数</span>(ひきすう)、関数から返ってくる結果を<span class=\"term\" data-term=\"戻り値\">戻り値</span>(もどりち)といいます。</p>\n\n<div class=\"figure\">\n<svg viewBox=\"0 0 560 160\" xmlns=\"http://www.w3.org/2000/svg\">\n  <g transform=\"translate(20, 50)\">\n    <rect x=\"0\" y=\"0\" width=\"100\" height=\"60\" fill=\"#FEF3C7\" stroke=\"#F59E0B\" stroke-width=\"2.5\" rx=\"6\"/>\n    <text x=\"50\" y=\"36\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#92400E\">3</text>\n    <text x=\"50\" y=\"78\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#92400E\">引数(値)</text>\n  </g>\n  <line x1=\"130\" y1=\"80\" x2=\"190\" y2=\"80\" stroke=\"#5B21B6\" stroke-width=\"2.5\"/>\n  <polygon points=\"185,75 195,80 185,85\" fill=\"#5B21B6\"/>\n  <text x=\"160\" y=\"72\" text-anchor=\"middle\" font-size=\"11\" fill=\"#5B21B6\" font-weight=\"700\">渡す</text>\n  <g transform=\"translate(210, 40)\">\n    <rect x=\"0\" y=\"0\" width=\"140\" height=\"80\" fill=\"#EDE9FE\" stroke=\"#7C3AED\" stroke-width=\"2.5\" rx=\"8\"/>\n    <text x=\"70\" y=\"32\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"#5B21B6\">関数</text>\n    <text x=\"70\" y=\"56\" text-anchor=\"middle\" font-size=\"11\" fill=\"#5B21B6\">何らかの処理を</text>\n    <text x=\"70\" y=\"72\" text-anchor=\"middle\" font-size=\"11\" fill=\"#5B21B6\">行って結果を返す</text>\n  </g>\n  <line x1=\"360\" y1=\"80\" x2=\"420\" y2=\"80\" stroke=\"#5B21B6\" stroke-width=\"2.5\"/>\n  <polygon points=\"415,75 425,80 415,85\" fill=\"#5B21B6\"/>\n  <text x=\"390\" y=\"72\" text-anchor=\"middle\" font-size=\"11\" fill=\"#5B21B6\" font-weight=\"700\">返す</text>\n  <g transform=\"translate(440, 50)\">\n    <rect x=\"0\" y=\"0\" width=\"100\" height=\"60\" fill=\"#A7F3D0\" stroke=\"#10B981\" stroke-width=\"2.5\" rx=\"6\"/>\n    <text x=\"50\" y=\"36\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#065F46\">結果</text>\n    <text x=\"50\" y=\"78\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#065F46\">戻り値</text>\n  </g>\n</svg>\n<div class=\"figure-caption\">図1:関数=「値(引数)を渡すと、結果(戻り値)が返ってくる」自動販売機のような仕組み</div>\n</div>\n\n<p>高認サンプル問題の<b>大問4</b>では、こんな関数が使われています:</p>\n\n<div class=\"code-block\" style=\"margin:12px 0;\">\n<span class=\"cmt\"># 「曜日」という関数:年・月・日を渡すと曜日番号が返る</span><br>\n<span class=\"ln\">(1)</span> <span class=\"var\">y</span> = <span class=\"kw\">曜日</span>(<span class=\"num\">2026</span>, <span class=\"num\">4</span>, <span class=\"num\">1</span>)<br>\n<span class=\"ln\">(2)</span> <span class=\"kw\">表示する</span>(<span class=\"var\">y</span>)<br>\n<span class=\"cmt\"># → 戻り値 3(=水曜日)が表示される</span>\n</div>\n<div class=\"inline-quiz\">\n<div class=\"inline-quiz-header\">📝 ミニテスト(2問) — 関数の呼び出し <span class=\"iq-arrow\">▼</span></div>\n<div class=\"inline-quiz-body\">\n<div class=\"iq-q\">\n<div class=\"iq-question\">Q1. 関数「曜日」は年・月・日を渡すと曜日番号(0=日, 1=月, …, 6=土)を返します。<code>y = 曜日(2026, 4, 1)</code> を実行すると、変数 y にはどんな値が入りますか?(2026年4月1日は水曜日とします)</div>\n<div class=\"iq-options\">\n  <button class=\"iq-opt\" data-correct=\"false\">2026</button>\n  <button class=\"iq-opt\" data-correct=\"false\">4</button>\n  <button class=\"iq-opt\" data-correct=\"true\">3</button>\n  <button class=\"iq-opt\" data-correct=\"false\">曜日</button>\n</div>\n<div class=\"iq-feedback\" data-exp=\"水曜日の曜日番号は3。関数の戻り値が y に代入されるので y = 3 になります。\"></div>\n</div>\n<div class=\"iq-q\">\n<div class=\"iq-question\">Q2. <code>y = 曜日(2024, 12, 25)</code> のうち、関数に渡されている<b>引数</b>はどれですか?</div>\n<div class=\"iq-options\">\n  <button class=\"iq-opt\" data-correct=\"false\">y(変数)</button>\n  <button class=\"iq-opt\" data-correct=\"false\">曜日(関数名)</button>\n  <button class=\"iq-opt\" data-correct=\"true\">2024, 12, 25(3つの値)</button>\n  <button class=\"iq-opt\" data-correct=\"false\">なし</button>\n</div>\n<div class=\"iq-feedback\" data-exp=\"関数名のあとの()内の値が引数。ここでは年=2024、月=12、日=25 の&lt;b&gt;3つが引数&lt;/b&gt;として渡されています。\"></div>\n</div>\n</div>\n</div>\n\n\n<p style=\"background:var(--primary-pale); padding:10px 14px; border-left:4px solid var(--primary); border-radius:6px; margin:10px 0;\">📌 <b>関数のメリット</b><br>\n関数の<b>中身を知らなくても使える</b>のがポイント。「年月日を渡せば曜日番号が返ってくる」とだけわかれば、複雑な計算式を覚える必要はありません。「自動販売機にお金を入れたら飲み物が出てくる」のと同じです。</p>\n\n<h4 style=\"color:var(--primary-dark); margin-top:18px;\">📅 高認サンプル類題:曜日プログラム</h4>\n\n<p>高認情報サンプル問題の大問4は、年・月・日から曜日を計算するプログラムが題材です。<b>「1月と2月は、前年の13月と14月として扱う」</b>というルールがあり、これを分岐構造で表現するのがカギです。</p>\n\n<div class=\"code-flow-wrap\">\n  <div clas e=\"#7C3AED\" stroke-width=\"2\" rx=\"3\"/>\n      <text x=\"140\" y=\"76\" text-anchor=\"middle\" font-size=\"11\" font-family=\"Consolas, monospace\">nen=2024, gatu=1</text>\n      <rect x=\"60\" y=\"90\" width=\"160\" height=\"28\" fill=\"#fff\" stroke=\"#7C3AED\" stroke-width=\"2\" rx=\"3\"/>\n      <text x=\"140\" y=\"108\" text-anchor=\"middle\" font-size=\"11\" font-family=\"Consolas, monospace\">hi = 15</text>\n      <line x1=\"140\" y1=\"118\" x2=\"140\" y2=\"136\" stroke=\"#5B21B6\" stroke-width=\"1.5\" marker-end=\"url(#arYb)\"/>\n      <!-- gatu <= 2 ? -->\n      <polygon points=\"140,138 220,178 140,218 60,178\" fill=\"#fff\" stroke=\"#7C3AED\" stroke-width=\"2\"/>\n      <text x=\"140\" y=\"182\" text-anchor=\"middle\" font-size=\"11\" font-family=\"Consolas, monospace\">gatu &lt;= 2 ?</text>\n      <!-- Yes(下に分岐:1月・2月の処理) -->\n      <line x1=\"140\" y1=\"218\" x2=\"140\" y2=\"240\" stroke=\"#5B21B6\" marker-end=\"url(#arYb)\"/>\n      <text x=\"155\" y=\"234\" font-size=\"9\" fill=\"#10B981\" font-weight=\"700\">Yes</text>\n      <!-- nen = nen - 1 -->\n      <rect x=\"40\" y=\"242\" width=\"200\" height=\"28\" fill=\"#FEF3C7\" stroke=\"#F59E0B\" stroke-width=\"2\" rx=\"3\"/>\n      <text x=\"140\" y=\"260\" text-anchor=\"middle\" font-size=\"11\" font-family=\"Consolas, monospace\">nen = nen - 1</text>\n      <line x1=\"140\" y1=\"270\" x2=\"140\" y2=\"284\" stroke=\"#5B21B6\" stroke-width=\"1.5\" marker-end=\"url(#arYb)\"/>\n      <!-- gatu = gatu + 12 -->\n      <rect x=\"40\" y=\"286\" width=\"200\" height=\"28\" fill=\"#FEF3C7\" stroke=\"#F59E0B\" stroke-width=\"2\" rx=\"3\"/>\n      <text x=\"140\" y=\"304\" text-anchor=\"middle\" font-size=\"11\" font-family=\"Consolas, monospace\">gatu = gatu + 12</text>\n      <line x1=\"140\" y1=\"314\" x2=\"140\" y2=\"350\" stroke=\"#5B21B6\"/>\n      <!-- No(右で迂回) -->\n      <line x1=\"220\" y1=\"178\" x2=\"252\" y2=\"178\" stroke=\"#5B21B6\"/>\n      <text x=\"232\" y=\"172\" font-size=\"9\" fill=\"#EF444 pan> <span class=\"var\">hi</span> = <span style=\"color:#FCA5A5;\">?</span>\n<span class=\"ln\">(4)</span> <span class=\"kw\">もし</span> <span class=\"var\">gatu</span> &lt;= <span class=\"num\">2</span> <span class=\"kw\">ならば</span>:\n<span class=\"ln\">(5)</span> <span class=\"indent\"></span>| <span class=\"var\">nen</span> = <span class=\"var\">nen</span> - <span class=\"num\">1</span>\n<span class=\"ln\">(6)</span> <span class=\"indent\"></span>L <span class=\"var\">gatu</span> = <span class=\"var\">gatu</span> + <span class=\"num\">12</span>\n<span class=\"ln\">(7)</span> <span class=\"var\">youbi</span> = <span class=\"kw\">曜日</span>(<span class=\"var\">nen</span>, <span class=\"var\">gatu</span>, <span class=\"var\">hi</span>)</div>\n<div class=\"iq-options\">\n  <button class=\"iq-opt\" data-correct=\"true\">nen=2024, gatu=12, hi=25</button>\n  <button class=\"iq-opt\" data-correct=\"false\">nen=2023, gatu=24, hi=25</button>\n  <button class=\"iq-opt\" data-correct=\"false\">nen=2024, gatu=0, hi=25</button>\n  <button class=\"iq-opt\" data-correct=\"false\">nen=2025, gatu=12, hi=25</button>\n</div>\n<div class=\"iq-feedback\" data-exp=\"実際の日付をそのまま入れます。「nen=2024, gatu=12, hi=25」が正解。12月は3月以降なので(4)の条件は偽となり、(5)(6)はスキップされます。\"></div>\n</div>\n<div class=\"iq-q\">\n<div class=\"iq-question\">Q2. <b>高認サンプル類題</b>:「2024年1月15日」の曜日を求めたい場合、関数(7行目)に渡される<b>3つの引数</b>はどうなりますか?</div>\n<div class=\"iq-options\">\n  <button class=\"iq-opt\" data-correct=\"false\">2024, 1, 15(そのまま)</button>\n  <button class=\"iq-opt\" data-correct=\"true\">2023, 13, 15(1月→前年の13月に変換)</button>\n  <button class=\"iq-opt\" data-correct=\"false\">2025, 1, 15(年を1増やす)</button>\n  <button class=\"iq-opt\" data-correct=\"false\">2024, 13, 15(月だけ変換)</button>\n</div>\n<div class=\"iq-feedback\" data-exp=\"1月なので(4)の条件 gatu&lt;=2 が真。(5)で nen=2024-1=2023、(6)で gatu=1+12=13。よって関数には &lt;b&gt;(2023, 13, 15)&lt;/b&gt; が渡されます。1月・2月は前年の13月・14月として扱うのが曜日計算のルール。\"></div>\n</div>\n</div>\n</div>\n\n\n<p>1月なので(4)の条件が<b // =================================================================
// 状態管理
// =================================================================
const state = {
  currentPage: 1,
  fillSelectedChip: {},  // unitId -> chip element
  startTime: null  // チャレンジボタン等を押すまでは null(タイマー停止状態)
};

// タイマーをスタート(まだスタートしていなければ)
function startGlobalTimerIfNeeded() {
  if (state.startTime === null) {
    state.startTime = Date.now();
  }
}

// =================================================================
// ふりがな変換 {漢字|よみ} -> <ruby>漢字<rt>よみ</rt></ruby>
// =================================================================
function convertFurigana(text) {
  if (!text) return '';
  return text.replace(/\{([^|}]+)\|([^}]+)\}/g, '<ruby>$1<rt>$2</rt></ruby>');
}

// =================================================================
// 用語解説の埋め込み(本文中の<span class="term">に既に書かれている前提でhandled by clickイベント)
// =================================================================
function bindTermPopups(scope, terms) {
  if (!terms) return;
  scope.querySelectorAll('.term').forEach(el => {
    const key = el.getAttribute('data-term');
    if (!key || !terms[key]) return;
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      showTermPopup(el, terms[key]);
    });
    el.addEventListener('mouseenter', (e) => {
      showTermPopup(el, terms[key]);
    });
    el.addEventListener('mouseleave', (e) => {
      const popup = document.getElementById('termPopup');
      // モバイルではタップ専用にしたいので、ホバー離脱では消さない選択もある
      // ここでは離脱で消す
      popup.classList.remove('show');
    });
  });
}

function showTermPopup(el, term) {
  const popup = document.getElementById('termPopup');
  popup.innerHTML = `
    <div><strong>${escapeHtml(el.textContent)}</strong></div>
    <div class="en">英語:${escapeHtml(term.en || '')}</div>
    <div class="kana">カタカナ:${escapeHtml(term.kana || '')}</div>
    <div class="origin">由来:${escapeHtml(term.origin || '')}</div>
  `;
  const rect = el.getBoundingClientRect();
  popup.style.left = (window.scrollX + rect.left) + 'px';
  popup.style.top = (window.scrollY + rect.bottom + 6) + 'px';
  // 画面右にはみ出すなら調整
  popup.classList.add('show');
  const popupRect = popup.getBoundingClientRect();
  if (popupRect.right > window.innerWidth - 10) {
    popup.style.left = (window.scrollX + window.innerWidth - popupRect.width - 10) + 'px';
  }
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.term') && !e.target.closest('.term-popup')) {
    document.getElementById('termPopup').classList.remove('show');
  }
});

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// <br>のみ許容するエスケープ(選択肢内で改行を表現したいとき用)
function escapeHtmlAllowBr(s) {
  return escapeHtml(s).replace(/&lt;br\s*\/?&gt;/gi, '<br>');
}

// =================================================================
// 単元カードのレンダリング
// =================================================================
function renderUnits() {
  const container = document.getElementById('unitsContainer');
  container.innerHTML = '';

  units.filter(u => u.page === state.currentPage).forEach(unit => {
    const card = document.createElement('div');
    card.className = 'unit-card';
    card.id = unit.id;
    card.innerHTML = `
      <div class="unit-header">
        <div class="unit-no">単元${unit.id.replace('u','')}</div>
        <div class="unit-title">${escapeHtml(unit.title.replace(/^\d+\.\s*/, ''))}</div>
      </div>
      <div class="unit-body">
        <div class="unit-explain">${convertFurigana(unit.body)}</div>

        <div class="mode-tabs" data-unit="${unit.id}">
          <button class="mode-tab active" data-mode="fill">✏️ 穴埋め</button>
          <button class="mode-tab" data-mode="choice4">🎯 4択</button>
          <button class="mode-tab" data-mode="ox">⭕❌ 〇×</button>
          <button class="mode-tab" data-mode="confirm">📝 確認</button>
          ${(unit.practice && unit.practice.length) ? `<button class="mode-tab" data-mode="practice">📚 練習</button>` : ''}
          ${(unit.exercise && unit.exercise.length) ? `<button class="mode-tab" data-mode="exercise">💪 演習</button>` : ''}
        </div>

        <div class="mode-content active" data-mode="fill" data-unit="${unit.id}">
          ${renderFill(unit)}
        </div>
        <div class="mode-content" data-mode="choice4" data-unit="${unit.id}">
          ${renderChoice4(unit)}
        </div>
        <div class="mode-content" data-mode="ox" data-unit="${unit.id}">
          ${renderOx(unit)}
        </div>
        <div class="mode-content" data-mode="confirm" data-unit="${unit.id}">
          ${renderConfirm(unit)}
        </div>
        ${(unit.practice && unit.practice.length) ? `
        <div class="mode-content" data-mode="practice" data-unit="${unit.id}">
          ${renderPracticeOrExercise(unit, 'practice')}
        </div>` : ''}
        ${(unit.exercise && unit.exercise.length) ? `
        <div class="mode-content" data-mode="exercise" data-unit="${unit.id}">
          ${renderPracticeOrExercise(unit, 'exercise')}
        </div>` : ''}
      </div>
    `;
    container.appendChild(card);

    // 用語ポップアップを本文に紐付け
    bindTermPopups(card.querySelector('.unit-explain'), unit.terms);

    // 穴埋めのドラッグ&ドロップ初期化
    initFill(card, unit);
    // 初期表示は「お手本」状態(語句が入った状態で読めるように)
    fillInitialAnswers(card, unit);
    // 4択イベント
    initChoice(card, unit, 'choice4');
    // 〇×
    initOx(card, unit);
    // 確認
    initChoice(card, unit, 'confirm');
    // 練習
    if (unit.practice && unit.practice.length) initPracticeOrExercise(card, unit, 'practice');
    // 演習
    if (unit.exercise && unit.exercise.length) initPracticeOrExercise(card, unit, 'exercise');
    // モードタブ切替
    initModeTabs(card);
    // ベスト記録表示
    updateBestRecords(unit.id);
  });

  // 1ページ目の一番下に「2ページ目へ進む」ボタンを追加
  if (state.currentPage === 1) {
    const nextBtn = document.createElement('div');
    nextBtn.id = 'next-page-btn';
    nextBtn.innerHTML = `
      <div style="
        margin: 32px 0 8px;
        text-align: center;
      ">
        <button onclick="goToPage2()" style="
          background: linear-gradient(135deg, #0891B2, #0E7490);
          color: #fff;
          border: none;
          padding: 16px 48px;
          border-radius: 40px;
          font-size: 1.1em;
          font-weight: 800;
          cursor: pointer;
          box-shadow: 0 4px 16px rgba(8,145,178,0.35);
          letter-spacing: 0.05em;
          transition: transform 0.2s, box-shadow 0.2s;
        "
        onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 20px rgba(8,145,178,0.45)'"
        onmouseout="this.style.transform='';this.style.boxShadow='0 4px 16px rgba(8,145,178,0.35)'"
        >
          📄 2ページ目（単元4〜5）へ進む →
        </button>
        <div style="margin-top:10px; font-size:0.82em; color:#6B7280;">
          ← 上のタブからでも切り替えられます
        </div>
      </div>
    `;
    container.appendChild(nextBtn);
  }
}

function goToPage2() {
  state.currentPage = 2;
  document.querySelectorAll('#pageTabs .tab').forEach(t => {
    t.classList.toggle('active', parseInt(t.dataset.page) === 2);
  });
  renderUnits();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// =================================================================
// 穴埋め:本文の【1】【2】... をドロップ枠に変換
// =================================================================
function renderFill(unit) {
  const fill = unit.fill;
  // 【n】を <span class="dz" data-idx="n-1"></span> に置換
  let text = escapeHtml(fill.text);
  text = text.replace(/【(\d+)】/g, (_, n) => {
    const idx = parseInt(n) - 1;
    return `<span class="dz" data-idx="${idx}" data-unit="${unit.id}"></span>`;
  });
  // 改行 -> <br>
  text = text.replace(/\n/g, '<br>');

  // 語句バンク
  const bankHtml = fill.bank.map((w, i) =>
    `<span class="word-chip" draggable="true" data-word="${escapeHtml(w)}" data-bank-idx="${i}">${escapeHtml(w)}</span>`
  ).join('');

  return `
    <div class="fill-hint" id="fill-hint-${unit.id}" style="font-size:0.85em; color:#6B7280; margin-bottom:6px;">📖 お手本表示中です。「自分で挑戦」を押すと、語句を外して練習できます。</div>
    <div class="fill-area" data-unit="${unit.id}">${text}</div>
    <div class="word-bank" data-unit="${unit.id}">${bankHtml}</div>
    <div class="best-records" id="best-${unit.id}"></div>
    <div class="btn-row">
      <button class="btn btn-amber" onclick="resetFill('${unit.id}')">🎯 自分で挑戦</button>
      <button class="btn btn-primary" onclick="checkFill('${unit.id}')">✅ 答え合わせ</button>
      <button class="btn btn-secondary" onclick="showFillAnswer('${unit.id}')">💡 お手本に戻す</button>
    </div>
    <div class="result" id="result-${unit.id}"></div>
  `;
}

function initFill(card, unit) {
  const fillArea = card.querySelector(`.fill-area[data-unit="${unit.id}"]`);
  const bank = card.querySelector(`.word-bank[data-unit="${unit.id}"]`);

  // チップ:ドラッグ + クリックで「選択」モード(モバイル対応)
  bank.querySelectorAll('.word-chip').forEach(chip => {
    chip.addEventListener('dragstart', (e) => {
      if (chip.classList.contains('used')) { e.preventDefault(); return; }
      chip.classList.add('dragging');
      e.dataTransfer.setData('text/plain', chip.dataset.word);
      e.dataTransfer.setData('bank-idx', chip.dataset.bankIdx);
    });
    chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
    chip.addEventListener('click', () => {
      if (chip.classList.contains('used')) return;
      // 選択をトグル
      bank.querySelectorAll('.word-chip.selected').forEach(c => {
        if (c !== chip) c.classList.remove('selected');
        c.style.boxShadow = '';
      });
      const isSel = chip.classList.toggle('selected');
      chip.style.boxShadow = isSel ? '0 0 0 3px var(--accent-amber)' : '';
      state.fillSelectedChip[unit.id] = isSel ? chip : null;
    });
  });

  // ドロップゾーン
  fillArea.querySelectorAll('.dz').forEach(dz => {
    dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.style.background = 'var(--primary-light)'; });
    dz.addEventListener('dragleave', () => { dz.style.background = ''; });
    dz.addEventListener('drop', (e) => {
      e.preventDefault();
      dz.style.background = '';
      const word = e.dataTransfer.getData('text/plain');
      const bankIdx = e.dataTransfer.getData('bank-idx');
      placeWordInDz(unit.id, dz, word, bankIdx);
    });
    // クリックで「選択中」のチップを配置(モバイル)
    dz.addEventListener('click', () => {
      const sel = state.fillSelectedChip[unit.id];
      if (sel && !sel.classList.contains('used')) {
        placeWordInDz(unit.id, dz, sel.dataset.word, sel.dataset.bankIdx);
        sel.classList.remove('selected');
        sel.style.boxShadow = '';
        state.fillSelectedChip[unit.id] = null;
      } else if (dz.classList.contains('has-word')) {
        // 既に置いてある場合、もう一度クリックすると外す
        returnDz(unit.id, dz);
      }
    });
  });
}

function placeWordInDz(unitId, dz, word, bankIdx) {
  // 既にdzに置いていた場合は元のチップを戻す
  if (dz.dataset.bankIdx !== undefined && dz.dataset.bankIdx !== '') {
    returnDz(unitId, dz);
  }
  dz.textContent = word;
  dz.classList.add('has-word');
  dz.classList.remove('correct', 'wrong');
  dz.dataset.bankIdx = bankIdx;
  // チップを使用済みに
  const card = document.getElementById(unitId);
  const chip = card.querySelector(`.word-chip[data-bank-idx="${bankIdx}"]`);
  if (chip) chip.classList.add('used');
}

function returnDz(unitId, dz) {
  const card = document.getElementById(unitId);
  const oldIdx = dz.dataset.bankIdx;
  if (oldIdx !== undefined && oldIdx !== '') {
    const chip = card.querySelector(`.word-chip[data-bank-idx="${oldIdx}"]`);
    if (chip) chip.classList.remove('used');
  }
  dz.textContent = '';
  dz.classList.remove('has-word', 'correct', 'wrong');
  dz.dataset.bankIdx = '';
}

function checkFill(unitId) {
  const unit = units.find(u => u.id === unitId);
  const card = document.getElementById(unitId);
  const dzs = card.querySelectorAll('.fill-area .dz');
  const answers = unit.fill.answers;
  let correct = 0;
  let total = answers.length;
  dzs.forEach((dz, i) => {
    if (dz.textContent === answers[i]) {
      dz.classList.add('correct');
      dz.classList.remove('wrong');
      correct++;
    } else if (dz.textContent !== '') {
      dz.classList.add('wrong');
      dz.classList.remove('correct');
    }
  });
  const result = card.querySelector(`#result-${unitId}`);
  const elapsed = getUnitTime(unitId);
  const allCorrect = (correct === total);
  if (allCorrect) {
    result.className = 'result show pass';
    result.innerHTML = `🎉 全問正解!(${correct}/${total}) <br>かかった時間:${formatTime(elapsed)}`;
    saveBestRecord(unitId, elapsed);
    confettiBurst();
    updateBestRecords(unitId);
  } else {
    result.className = 'result show fail';
    result.innerHTML = `${correct}/${total} 正解。間違えた箇所を見直してみましょう。`;
  }
}

function showFillAnswer(unitId) {
  const unit = units.find(u => u.id === unitId);
  const card = document.getElementById(unitId);
  const dzs = card.querySelectorAll('.fill-area .dz');
  // 既存配置を全部リセット
  dzs.forEach(dz => returnDz(unitId, dz));
  // 答えを順に置く
  dzs.forEach((dz, i) => {
    dz.textContent = unit.fill.answers[i];
    dz.classList.add('has-word');
    dz.classList.add('correct');
  });
  // バンクのチップを使用済みに(対応する単語を)
  unit.fill.answers.forEach(ans => {
    const chip = Array.from(card.querySelectorAll('.word-chip')).find(c =>
      c.dataset.word === ans && !c.classList.contains('used'));
    if (chip) chip.classList.add('used');
  });
  const result = card.querySelector(`#result-${unitId}`);
  result.className = 'result show pass';
  result.innerHTML = `💡 お手本を表示しました。じっくり読んでから、「🎯 自分で挑戦」を押して練習してみましょう。`;
  // ヒントメッセージを「お手本表示中」に
  const hint = document.getElementById(`fill-hint-${unitId}`);
  if (hint) hint.innerHTML = '📖 お手本表示中です。「🎯 自分で挑戦」を押すと、語句を外して練習できます。';
}

// 初期表示用:お手本を静かに表示(メッセージなし、結果欄に表示しない)
function fillInitialAnswers(card, unit) {
  const dzs = card.querySelectorAll('.fill-area .dz');
  dzs.forEach((dz, i) => {
    const ans = unit.fill.answers[i];
    if (ans === undefined) return;
    dz.textContent = ans;
    dz.classList.add('has-word');
    // 初期表示は「正解色」ではなく「埋まっている色」にしておく(お手本らしく)
  });
  // 対応するチップを使用済みに
  unit.fill.answers.forEach(ans => {
    const chip = Array.from(card.querySelectorAll('.word-chip')).find(c =>
      c.dataset.word === ans && !c.classList.contains('used'));
    if (chip) chip.classList.add('used');
  });
}

function resetFill(unitId) {
  const card = document.getElementById(unitId);
  card.querySelectorAll('.fill-area .dz').forEach(dz => returnDz(unitId, dz));
  card.querySelectorAll('.word-chip').forEach(c => {
    c.classList.remove('used', 'selected');
    c.style.boxShadow = '';
  });
  const result = card.querySelector(`#result-${unitId}`);
  result.classList.remove('show', 'pass', 'fail');
  // ヒントメッセージを「挑戦中」に切り替え
  const hint = document.getElementById(`fill-hint-${unitId}`);
  if (hint) hint.innerHTML = '🎯 挑戦中です。語句バンクから語句をドラッグ(またはタップして枠をクリック)で配置しましょう。';
  // 単元タイマー再スタート
  state.unitStartTime = state.unitStartTime || {};
  state.unitStartTime[unitId] = Date.now();
  // グローバルタイマーもスタート(まだ動いていなければ)
  startGlobalTimerIfNeeded();
}

// =================================================================
// 単元ごとのタイマー(穴埋め用)
// =================================================================
function getUnitTime(unitId) {
  state.unitStartTime = state.unitStartTime || {};
  if (!state.unitStartTime[unitId]) state.unitStartTime[unitId] = Date.now();
  return Math.floor((Date.now() - state.unitStartTime[unitId]) / 1000);
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// =================================================================
// ベスト記録(localStorage)
// =================================================================
function saveBestRecord(unitId, sec) {
  const key = `joho4_best_${unitId}`;
  let arr = JSON.parse(localStorage.getItem(key) || '[]');
  arr.push({ sec, date: new Date().toISOString().slice(0,10) });
  arr.sort((a, b) => a.sec - b.sec);
  arr = arr.slice(0, 3);
  localStorage.setItem(key, JSON.stringify(arr));
}

function updateBestRecords(unitId) {
  const key = `joho4_best_${unitId}`;
  const arr = JSON.parse(localStorage.getItem(key) || '[]');
  const el = document.getElementById(`best-${unitId}`);
  if (!el) return;
  if (arr.length === 0) {
    el.innerHTML = `<strong>🏆 ベスト3</strong>:まだ記録がありません。穴埋めを全問正解してみましょう。`;
  } else {
    const list = arr.map((r, i) => `${['🥇','🥈','🥉'][i]} ${formatTime(r.sec)}`).join(' / ');
    el.innerHTML = `<strong>🏆 ベスト3</strong>:${list}`;
  }
}

// =================================================================
// 4択 / 確認モード(共通)
// =================================================================
function renderChoice4(unit) {
  return unit.choice4.map((q, qi) => renderChoiceQ(unit.id, 'choice4', q, qi)).join('');
}

function renderConfirm(unit) {
  return unit.confirm.map((q, qi) => renderChoiceQ(unit.id, 'confirm', q, qi)).join('');
}

function renderChoiceQ(unitId, mode, q, qi) {
  const opts = q.options.map((opt, oi) =>
    `<button class="q-option" data-unit="${unitId}" data-mode="${mode}" data-qi="${qi}" data-oi="${oi}">${escapeHtmlAllowBr(opt)}</button>`
  ).join('');
  // q.q: 問題文(プレーンテキスト) — escapeHtmlだが <br> を含む既存問題に配慮:そのまま出す
  // ただし code/flowchartがある場合はQに含めない
  const qText = (q.q || '').replace(/<br\s*\/?>/g, '<br>');  // <br>をそのまま
  // codeフィールド:DNCL風プログラム(縦1列で表示)
  const codeBlock = q.code ? `
    <div class="q-code-block">${q.code.split('\n').map(line => {
      // 既にHTMLタグ(<span>)が含まれている場合はそのまま、プレーンテキストならエスケープ
      if (line.includes('<span')) return line;
      return escapeHtml(line);
    }).join('<br>')}</div>
  ` : '';
  // flowchartフィールド:フローチャートSVG(ボタンで開閉)
  const flowchartBtn = q.flowchart ? `
    <button class="q-flowchart-toggle" type="button" data-target="fc-${unitId}-${mode}-${qi}">📊 フローチャート図を見る ▼</button>
    <div class="q-flowchart-content" id="fc-${unitId}-${mode}-${qi}" style="display:none;">${q.flowchart}</div>
  ` : '';
  return `
    <div class="q-item" data-unit="${unitId}" data-mode="${mode}" data-qi="${qi}">
      <div class="q-text">問${qi + 1}:${qText}</div>
      ${codeBlock}
      ${flowchartBtn}
      <div class="q-options">${opts}</div>
      <div class="q-feedback">
        <div><span class="label">💡 解説</span>${escapeHtml(q.exp || '')}</div>
        ${q.ex ? `<div style="margin-top:6px;"><span class="label">📝 例</span>${escapeHtml(q.ex)}</div>` : ''}
      </div>
    </div>
  `;
}

function initChoice(card, unit, mode) {
  const items = card.querySelectorAll(`.q-item[data-mode="${mode}"]`);
  items.forEach(item => {
    const qi = parseInt(item.dataset.qi);
    const q = unit[mode][qi];
    // フローチャート図ボタンの開閉
    const fcBtn = item.querySelector('.q-flowchart-toggle');
    if (fcBtn) {
      fcBtn.addEventListener('click', () => {
        const target = document.getElementById(fcBtn.dataset.target);
        if (target.style.display === 'none') {
          target.style.display = 'block';
          fcBtn.innerHTML = '📊 フローチャート図を閉じる ▲';
          fcBtn.classList.add('open');
        } else {
          target.style.display = 'none';
          fcBtn.innerHTML = '📊 フローチャート図を見る ▼';
          fcBtn.classList.remove('open');
        }
      });
    }
    item.querySelectorAll('.q-option').forEach(opt => {
      opt.addEventListener('click', () => {
        startGlobalTimerIfNeeded();
        const oi = parseInt(opt.dataset.oi);
        // 全ボタン無効化
        item.querySelectorAll('.q-option').forEach(o => o.classList.add('disabled'));
        // 正解強調
        item.querySelectorAll('.q-option').forEach((o, idx) => {
          if (idx === q.answer) o.classList.add('correct');
        });
        // 不正解
        if (oi !== q.answer) opt.classList.add('wrong');
        // 解説表示
        item.querySelector('.q-feedback').classList.add('show');
        // 全問正解チェック
        setTimeout(() => checkAllCorrect(card, unit, mode), 300);
      });
    });
  });
}

// =================================================================
// 〇×モード
// =================================================================
function renderOx(unit) {
  return unit.ox.map((q, qi) => {
    const codeBlock = q.code ? `<div class="q-code-block">${q.code.split('\n').map(l => l.includes('<span') ? l : escapeHtml(l)).join('<br>')}</div>` : '';
    const fcBtn = q.flowchart ? `<button class="q-flowchart-toggle" type="button" data-target="fc-${unit.id}-ox-${qi}">📊 フローチャート図を見る ▼</button><div class="q-flowchart-content" id="fc-${unit.id}-ox-${qi}" style="display:none;">${q.flowchart}</div>` : '';
    return `
    <div class="q-item" data-unit="${unit.id}" data-mode="ox" data-qi="${qi}">
      <div class="q-text">問${qi + 1}:${q.q}</div>
      ${codeBlock}
      ${fcBtn}
      <div class="ox-options">
        <button class="ox-btn maru" data-unit="${unit.id}" data-qi="${qi}" data-ans="true">○</button>
        <button class="ox-btn batsu" data-unit="${unit.id}" data-qi="${qi}" data-ans="false">×</button>
      </div>
      <div class="q-feedback">
        <div><span class="label">💡 解説</span>${escapeHtml(q.exp || '')}</div>
      </div>
    </div>
    `;
  }).join('');
}

function initOx(card, unit) {
  card.querySelectorAll('.q-item[data-mode="ox"]').forEach(item => {
    const qi = parseInt(item.dataset.qi);
    const q = unit.ox[qi];
    // フローチャート図ボタンの開閉
    const fcBtn = item.querySelector('.q-flowchart-toggle');
    if (fcBtn) {
      fcBtn.addEventListener('click', () => {
        const target = document.getElementById(fcBtn.dataset.target);
        if (target.style.display === 'none') {
          target.style.display = 'block';
          fcBtn.innerHTML = '📊 フローチャート図を閉じる ▲';
          fcBtn.classList.add('open');
        } else {
          target.style.display = 'none';
          fcBtn.innerHTML = '📊 フローチャート図を見る ▼';
          fcBtn.classList.remove('open');
        }
      });
    }
    item.querySelectorAll('.ox-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        startGlobalTimerIfNeeded();
        const ans = btn.dataset.ans === 'true';
        item.querySelectorAll('.ox-btn').forEach(b => b.disabled = true);
        const correctBtn = item.querySelector(`.ox-btn[data-ans="${q.answer}"]`);
        correctBtn.classList.add('correct');
        if (ans !== q.answer) btn.classList.add('wrong');
        item.querySelector('.q-feedback').classList.add('show');
        // 全問正解チェック
        setTimeout(() => checkAllCorrect(card, unit, 'ox'), 300);
      });
    });
  });
}

// =================================================================
// 全問正解チェック(各モード共通)
// =================================================================
function checkAllCorrect(card, unit, mode) {
  // ぜんぶの問題が解答済みかつ正解か?
  const items = card.querySelectorAll(`.q-item[data-mode="${mode}"]`);
  if (!items.length) return false;
  let answered = 0;
  let correct = 0;
  items.forEach((item, qi) => {
    const q = unit[mode][qi];
    if (mode === 'ox') {
      // 〇×は disabled になっていたら回答済み
      const btns = item.querySelectorAll('.ox-btn');
      const isDisabled = btns[0].disabled;
      if (isDisabled) {
        answered++;
        // 正解: wrongクラスがついたボタンが無いこと(=ユーザーは正解した)
        const userWrong = item.querySelector('.ox-btn.wrong');
        if (!userWrong) correct++;
      }
    } else {
      // 4択系
      const opts = item.querySelectorAll('.q-option');
      if (opts.length === 0) return;
      const isAnswered = opts[0].classList.contains('disabled');
      if (isAnswered) {
        answered++;
        const userWrong = item.querySelector('.q-option.wrong');
        if (!userWrong) correct++;
      }
    }
  });
  if (answered === items.length && correct === items.length) {
    // 全問正解!花吹雪+メッセージ
    showAllCorrectCelebration(card, unit, mode, correct);
    return true;
  }
  return false;
}

function showAllCorrectCelebration(card, unit, mode, total) {
  // 既にお祝い表示済みなら何もしない(連打防止)
  const content = card.querySelector(`.mode-content[data-mode="${mode}"]`);
  if (!content || content.querySelector('.all-correct-banner')) return;

  // バナーを挿入
  const modeLabel = {
    'choice4': '4択',
    'ox': '〇×',
    'confirm': '確認',
    'practice': '練習',
    'exercise': '演習'
  }[mode] || '';
  const banner = document.createElement('div');
  banner.className = 'all-correct-banner';
  banner.style.cssText = 'margin-top:16px; padding:18px 24px; background:linear-gradient(135deg,#FEF3C7,#FCE7F3); border:2px solid #F59E0B; border-radius:14px; text-align:center; box-shadow:0 4px 20px rgba(245,158,11,.25); font-size:1.05em; font-weight:700; color:#92400E;';
  banner.innerHTML = `🎉 全問正解!${modeLabel}モード ${total}問すべて正解しました! <span style="font-size:1.4em;">🎊✨</span>`;
  content.appendChild(banner);

  // 花吹雪
  confettiBurst();
}



// =================================================================
// 練習モード / 演習モード(input型 と choice型 の混在)
// =================================================================
function renderPracticeOrExercise(unit, mode) {

  const headerColor = (mode === 'practice') ? '#10B981' : '#EC4899';
  const headerBg = (mode === 'practice') ? '#D1FAE5' : '#FCE7F3';
  const headerLabel = (mode === 'practice') ? '📚 練習問題:基本の定着' : '💪 演習問題:応用力アップ';
  const headerHint = (mode === 'practice')
    ? '一問ごとにすぐ答え合わせ。電卓を使ってもOKです。'
    : '少し考えるシナリオです。じっくり取り組みましょう。';

  const items = list.map((q, qi) => {
    if (q.type === 'input') {
      return `
        <div class="q-item pe-item" data-unit="${unit.id}" data-mode="${mode}" data-qi="${qi}" style="border-left-color:${headerColor};">

              data-unit="${unit.id}" data-mode="${mode}" data-qi="${qi}" placeholder="答えを入力"/>

            <button class="btn btn-primary pe-check" data-unit="${unit.id}" data-mode="${mode}" data-qi="${qi}">✅ 答え合わせ</button>
            <button class="btn btn-secondary pe-show" data-unit="${unit.id}" data-mode="${mode}" data-qi="${qi}">💡 答えを見る</button>
          </div>
          <div class="pe-judge" style="display:none; margin:6px 0; font-weight:700;"></div>
          <div class="q-feedback">
            <div><span class="label">💡 解説</span>${escapeHtml(q.exp || '')}</div>
            ${q.ex ? `<div style="margin-top:6px;"><span class="label">📝 例</span>${escapeHtml(q.ex)}</div>` : ''}
          </div>
        </div>`;
    } else { // 'choice' or default
      const opts = (q.options || []).map((opt, oi) =>
        `<button class="q-option" data-unit="${unit.id}" data-mode="${mode}" data-qi="${qi}" data-oi="${oi}">${escapeHtmlAllowBr(opt)}</button>`
      ).join('');
      return `
        <div class="q-item pe-item" data-unit="${unit.id}" data-mode="${mode}" data-qi="${qi}" style="border-left-color:${headerColor};">
          <div class="q-text">問${qi + 1}:${escapeHtml(q.q)}</div>
          <div class="q-options">${opts}</div>
          <div class="q-feedback">
            <div><span class="label">💡 解説</span>${escapeHtml(q.exp || '')}</div>
            ${q.ex ? `<div style="margin-top:6px;"><span class="label">📝 例</span>${escapeHtml(q.ex)}</div>` : ''}
          </div>
        </div>`;
    }
  }).join('');

  return `
    <div class="pe-header" style="background:${headerBg}; padding:10px 14px; border-radius:8px; margin-bottom:12px;">
      <div style="font-weight:700; color:${headerColor === '#10B981' ? '#065F46' : '#9D174D'};">${headerLabel}</div>
      <div style="font-size:0.85em; color:#6B7280; margin-top:4px;">${headerHint}</div>
    </div>
    ${items}
  `;
}

function initPracticeOrExercise(card, unit, mode) {
  const list = unit[mode] || [];
  // 入力型の答え合わせボタン
  card.querySelectorAll(`.pe-check[data-mode="${mode}"]`).forEach(btn => {
    btn.addEventListener('click', () => {
      const qi = parseInt(btn.dataset.qi);
      const q = list[qi];
      const item = card.querySelector(`.pe-item[data-mode="${mode}"][data-qi="${qi}"]`);
      const input = item.querySelector('.pe-input');
      const judge = item.querySelector('.pe-judge');
      const userVal = (input.value || '').trim().replace(/,/g, '').replace(/\s/g, '');
      const correctVal = String(q.answer).replace(/,/g, '');
      // 数値比較を許容(123 == 123.0など)
      let ok = (userVal === correctVal);
      if (!ok) {
        const a = parseFloat(userVal), b = parseFloat(correctVal);
        if (!isNaN(a) && !isNaN(b) && a === b) ok = true;
      }
      judge.style.display = 'block';
      if (ok) {
        judge.textContent = `🎉 正解!  答え:${q.answer} ${q.unit || ''}`;
        judge.style.color = '#065F46';
        input.style.borderColor = '#10B981';
        input.style.background = '#D1FAE5';
      } else {
        judge.textContent = `😢 残念。正しい答えは「${q.answer} ${q.unit || ''}」です。`;
        judge.style.color = '#991B1B';
        input.style.borderColor = '#EF4444';
        input.style.background = '#FEE2E2';
      }
      item.querySelector('.q-feedback').classList.add('show');
    });
  });
  // 入力型の「答えを見る」ボタン
  card.querySelectorAll(`.pe-show[data-mode="${mode}"]`).forEach(btn => {
    btn.addEventListener('click', () => {
      const qi = parseInt(btn.dataset.qi);
      const q = list[qi];
      const item = card.querySelector(`.pe-item[data-mode="${mode}"][data-qi="${qi}"]`);
      const input = item.querySelector('.pe-input');
      const judge = item.querySelector('.pe-judge');
      input.value = String(q.answer);
      input.style.borderColor = '#F59E0B';
      input.style.background = '#FEF3C7';
      judge.style.display = 'block';
      judge.textContent = `💡 答え:${q.answer} ${q.unit || ''}`;
      judge.style.color = '#92400E';
      item.querySelector('.q-feedback').classList.add('show');
    });
  });
  // Enterキーで答え合わせ
  card.querySelectorAll(`.pe-input[data-mode="${mode}"]`).forEach(inp => {
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const qi = parseInt(inp.dataset.qi);
        const btn = card.querySelector(`.pe-check[data-mode="${mode}"][data-qi="${qi}"]`);
        if (btn) btn.click();
      }
    });
  });
  // 4択型(choice)の処理は initChoice と同じロジック
  card.querySelectorAll(`.pe-item[data-mode="${mode}"]`).forEach(item => {
    const qi = parseInt(item.dataset.qi);
    const q = list[qi];
    if (!q || q.type === 'input') return;
    item.querySelectorAll('.q-option').forEach(opt => {
      opt.addEventListener('click', () => {
        startGlobalTimerIfNeeded();
        const oi = parseInt(opt.dataset.oi);
        item.querySelectorAll('.q-option').forEach(o => o.classList.add('disabled'));
        item.querySelectorAll('.q-option').forEach((o, idx) => {
          if (idx === q.answer) o.classList.add('correct');
        });
        if (oi !== q.answer) opt.classList.add('wrong');
        item.querySelector('.q-feedback').classList.add('show');
        // 全問正解チェック(練習・演習用)
        setTimeout(() => checkAllCorrectPE(card, unit, mode), 300);
      });
    });
  });
}

// 練習・演習用 全問正解チェック(pe-item セレクタを使う)
function checkAllCorrectPE(card, unit, mode) {
  const items = card.querySelectorAll(`.pe-item[data-mode="${mode}"]`);
  if (!items.length) return;
  let answered = 0, correct = 0;
  items.forEach((item, qi) => {
    const q = (unit[mode] || [])[qi];
    if (!q) return;
    if (q.type === 'input') {
      // input型: judgeが表示済みかつ green なら正解
      const judge = item.querySelector('.pe-judge');
      if (judge && judge.style.display === 'block') {
        answered++;
        if (judge.textContent.includes('正解')) correct++;
      }
    } else {
      const opts = item.querySelectorAll('.q-option');
      if (opts.length === 0) return;
      if (opts[0].classList.contains('disabled')) {
        answered++;
        if (!item.querySelector('.q-option.wrong')) correct++;
      }
    }
  });
  if (answered === items.length && correct === items.length) {
    showAllCorrectCelebration(card, unit, mode, correct);
  }
}

// =================================================================
// モードタブ切替
// =================================================================
function initModeTabs(card) {
  const tabs = card.querySelectorAll('.mode-tab');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      const mode = tab.dataset.mode;
      const unitId = card.id;
      // タブ更新
      card.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      // コンテンツ切替
      card.querySelectorAll('.mode-content').forEach(c => c.classList.remove('active'));
      card.querySelector(`.mode-content[data-mode="${mode}"]`).classList.add('active');
    });
  });
}

// =================================================================
// 花吹雪
// =================================================================
function confettiBurst() {
  const colors = ['#7C3AED', '#5B21B6', '#A78BFA', '#F59E0B', '#FBBF24', '#EC4899', '#10B981'];
  for (let i = 0; i < 80; i++) {
    const conf = document.createElement('div');
    conf.className = 'confetti';
    conf.style.background = colors[Math.floor(Math.random() * colors.length)];
    conf.style.left = Math.random() * 100 + 'vw';
    conf.style.top = '-20px';
    conf.style.transform = `rotate(${Math.random() * 360}deg)`;
    document.body.appendChild(conf);
    const duration = 2000 + Math.random() * 2000;
    const xMove = (Math.random() - 0.5) * 200;
    conf.animate([
      { transform: `translate(0,0) rotate(0deg)`, opacity: 1 },
      { transform: `translate(${xMove}px, ${window.innerHeight + 50}px) rotate(${720 + Math.random()*360}deg)`, opacity: 0 }
    ], { duration: duration, easing: 'cubic-bezier(0.2, 0.7, 0.4, 1.0)' });
    setTimeout(() => conf.remove(), duration);
  }
}

// ページタブ
// =================================================================
document.querySelectorAll('#pageTabs .tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const page = parseInt(tab.dataset.page);
    state.currentPage = page;
    document.querySelectorAll('#pageTabs .tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderUnits();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

// =================================================================
// グローバルタイマー
// =================================================================
function tickTimer() {
  if (state.startTime === null) {
    // まだスタートしていない場合は 00:00 を表示
    const el = document.getElementById('timer');
    if (el) el.textContent = '⏱️ 00:00';
    return;
  }
  const sec = Math.floor((Date.now() - state.startTime) / 1000);
  document.getElementById('timer').textContent = '⏱️ ' + formatTime(sec);
}
setInterval(tickTimer, 1000);
// 初期表示
tickTimer();

// =================================================================
// インライン・ミニテスト ハンドリング
// =================================================================
function setupInlineQuizzes() {
  // ヘッダークリックで展開・収納
  document.querySelectorAll('.inline-quiz-header').forEach(header => {
    if (header.dataset.bound) return;
    header.dataset.bound = '1';
    header.addEventListener('click', () => {
      const wrap = header.closest('.inline-quiz');
      wrap.classList.toggle('open');
    });
  });
  // 選択肢クリックで正誤判定
  document.querySelectorAll('.iq-opt').forEach(btn => {
    if (btn.dataset.bound) return;
    btn.dataset.bound = '1';
    btn.addEventListener('click', () => {
      startGlobalTimerIfNeeded();
      const q = btn.closest('.iq-q');
      if (!q) return;
      const isCorrect = btn.dataset.correct === 'true';
      const allBtns = q.querySelectorAll('.iq-opt');
      // 全ボタンを無効化
      allBtns.forEach(b => {
        b.disabled = true;
        if (b.dataset.correct === 'true') b.classList.add('correct');
      });
      if (!isCorrect) btn.classList.add('wrong');
      // フィードバック表示
      const fb = q.querySelector('.iq-feedback');
      if (fb) {
        fb.classList.add('show', isCorrect ? 'correct' : 'wrong');
        if (isCorrect) fb.innerHTML = '🎉 <b>正解!</b> ' + (fb.dataset.exp || '');
        else fb.innerHTML = '😅 <b>不正解。</b> ' + (fb.dataset.exp || '');
      }
    });
  });
}

// 初期描画
// =================================================================
// URLハッシュ(#u3など)から初期ページを決定
(function applyInitialHash() {
  const hash = (location.hash || '').replace('#', '');
  if (!hash) return;
  const target = units.find(u => u.id === hash);
  if (target && target.page) {
    state.currentPage = target.page;
    document.querySelectorAll('#pageTabs .tab').forEach(t => {
      t.classList.toggle('active', parseInt(t.dataset.page) === target.page);
    });
  }
})();

renderUnits();

// ハッシュに該当する単元へスクロール
(function scrollToHashUnit() {
  const hash = (location.hash || '').replace('#', '');
  if (!hash) return;
  setTimeout(function() {
    const card = document.getElementById(hash);
    if (card) {
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      card.style.transition = 'box-shadow 0.4s';
      const orig = card.style.boxShadow;
      card.style.boxShadow = '0 0 0 4px #fbbf24, 0 8px 30px rgba(245,158,11,.4)';
      setTimeout(function(){ card.style.boxShadow = orig; }, 1800);
    }
  }, 120);
})();

// hashchange時の対応
window.addEventListener('hashchange', function() {
  const hash = (location.hash || '').replace('#', '');
  if (!hash) return;
  const target = units.find(u => u.id === hash);
  if (target && target.page) {
    state.currentPage = target.page;
    document.querySelectorAll('#pageTabs .tab').forEach(t => {
      t.classList.toggle('active', parseInt(t.dataset.page) === target.page);
    });
    renderUnits();
    setTimeout(function() {
      const card = document.getElementById(hash);
      if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        card.style.transition = 'box-shadow 0.4s';
        const orig = card.style.boxShadow;
        card.style.boxShadow = '0 0 0 4px #fbbf24, 0 8px 30px rgba(245,158,11,.4)';
        setTimeout(function(){ card.style.boxShadow = orig; }, 1800);
      }
    }, 120);
  }
});



// DOM変更を監視して、新しいインラインクイズが追加されたら自動的にセットアップ
const _iqObserver = new MutationObserver(() => setupInlineQuizzes());
_iqObserver.observe(document.body, { childList: true, subtree: true });
// 初回セットアップ
setTimeout(setupInlineQuizzes, 100);
